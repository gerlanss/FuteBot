# ──────────────────────────────────────────────
# FuteBot — Configuração Nginx (reverse proxy)
#
# Instalação:
#   sudo cp /opt/futebot/deploy/nginx.conf /etc/nginx/sites-available/futebot
#   sudo ln -sf /etc/nginx/sites-available/futebot /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Acesso:
#   http://201.76.43.40  →  Dashboard Flask
# ──────────────────────────────────────────────

server {
    listen 80;
    server_name 201.76.43.40;

    # Headers de segurança básicos
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Tamanho máximo de upload (caso futuro)
    client_max_body_size 10M;

    # Proxy para o Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos (algumas rotas fazem request externo)
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # Arquivos estáticos direto pelo Nginx (mais rápido)
    location /static/ {
        alias /opt/futebot/static/;
        expires 7d;
        access_log off;
    }
}
