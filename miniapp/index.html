<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FuteBot Mini App</title>
  <link rel="stylesheet" href="/miniapp/assets/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <p class="eyebrow">FUTEBOT CONTROL</p>
      <h1>Painel de operacao</h1>
      <p class="sub">Controle a banca, filtre as tips e acompanhe o historico sem sair do Telegram.</p>
    </header>

    <section class="stats-grid" id="stats-grid"></section>

    <section class="panel bankroll-panel">
      <div class="panel-head">
        <h2>Gerenciador de banca</h2>
      </div>
      <div class="bankroll-grid" id="bankroll-grid"></div>
      <div class="bankroll-form">
        <label class="field">
          <span>Banca inicial</span>
          <input id="bankroll-initial" type="number" min="0" step="10">
        </label>
        <label class="field">
          <span>Valor de 1 unidade</span>
          <input id="stake-unit" type="number" min="0" step="0.5">
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Preferencias</h2>
        <button id="save-btn" class="primary">Salvar tudo</button>
      </div>

      <label class="toggle">
        <input id="alerts-enabled" type="checkbox">
        <span>Receber alertas automaticos</span>
      </label>

      <label class="field">
        <span>EV minimo para alertas</span>
        <input id="min-ev" type="number" min="0" max="50" step="0.5">
      </label>

      <div class="league-block">
        <span class="legend">Ligas favoritas</span>
        <div id="league-list" class="league-list"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Historico de tips</h2>
      </div>

      <div class="filters">
        <label class="field compact">
          <span>Liga</span>
          <select id="filter-league"></select>
        </label>
        <label class="field compact">
          <span>Mercado</span>
          <select id="filter-market"></select>
        </label>
        <label class="field compact">
          <span>Status</span>
          <select id="filter-status">
            <option value="all">Todos</option>
            <option value="open">Abertas</option>
            <option value="win">Green</option>
            <option value="loss">Red</option>
          </select>
        </label>
      </div>

      <div id="latest-list" class="latest-list"></div>
    </section>

    <p id="status-line" class="status-line"></p>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/miniapp/assets/app.js"></script>
</body>
</html>
